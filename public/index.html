<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>小光 V11 · 八宝学习操作系统</title>
<style>
:root{--bg1:#eef7ff;--bg2:#fff7ed;--ink:#172033;--muted:#667085;--card:rgba(255,255,255,.9);--line:#e5e7eb;--blue:#38bdf8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--dark:#0f172a;--soft:#f8fafc}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:linear-gradient(135deg,var(--bg1),#fff,var(--bg2));color:var(--ink)}button,input,textarea,select{font:inherit}.app{max-width:1180px;margin:auto;padding:18px}.hero,.panel,.card,.footer{background:var(--card);box-shadow:0 12px 34px rgba(15,23,42,.07);backdrop-filter:blur(10px)}.hero{border-radius:32px;padding:24px;display:grid;grid-template-columns:1fr 290px;gap:18px;align-items:stretch;margin-bottom:16px}.tag{display:inline-flex;gap:8px;align-items:center;background:#e0f2fe;color:#0369a1;border-radius:999px;padding:7px 13px;font-size:14px;font-weight:900}h1{font-size:36px;margin:12px 0 8px;letter-spacing:-.04em}.sub{line-height:1.7;color:var(--muted);margin:0}.motto{margin-top:12px;padding:14px 16px;border-left:5px solid var(--blue);background:#f0f9ff;border-radius:18px;line-height:1.7}.progress{background:#0f172a;color:#fff;border-radius:26px;padding:20px;display:flex;flex-direction:column;justify-content:center}.progressNum{font-size:40px;font-weight:950}.bar{height:9px;border-radius:999px;background:rgba(255,255,255,.18);overflow:hidden;margin:8px 0}.barin{height:100%;width:0;background:linear-gradient(90deg,#22c55e,#a3e635);transition:.25s}.tiny{font-size:13px;color:#94a3b8;line-height:1.5}.panel{border-radius:28px;padding:18px;margin-bottom:16px}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.avatar{width:58px;height:58px;border-radius:20px;background:linear-gradient(135deg,#38bdf8,#fbbf24);display:grid;place-items:center;font-size:30px}.title{font-size:22px;font-weight:950}.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.chip{background:#f1f5f9;color:#475569;border-radius:999px;padding:8px 12px;font-size:14px;font-weight:800}.nav{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:10px;margin-bottom:16px}.nav button,.row button,select{border:1px solid var(--line);background:#fff;border-radius:16px;padding:11px 12px;font-weight:900;cursor:pointer}.nav button.active,.row button.active{background:var(--dark);color:#fff;border-color:var(--dark)}.page{display:none;animation:fade .18s}.page.active{display:block}@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{border-radius:26px;padding:20px}.card h2{margin:0 0 8px;font-size:22px}.card h3{margin:8px 0;font-size:18px}.card p{color:var(--muted);line-height:1.65}.bigq{font-size:21px;font-weight:950;margin:10px 0}.primary{width:100%;border:0;background:var(--dark);color:#fff;border-radius:17px;padding:13px;font-weight:950;margin-top:12px;cursor:pointer}.primary.done{background:#059669}.secondary{background:#f8fafc!important;color:#334155!important}.choiceGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.choice{border:1px solid #e2e8f0;background:#fff;border-radius:18px;padding:13px;text-align:left;font-weight:850;cursor:pointer}.choice.active{background:#ecfeff;border-color:#67e8f9;color:#155e75}.choice .small{display:block;font-size:13px;color:#64748b;font-weight:600;margin-top:4px}.task{border:1px solid #edf2f7}.task.done{background:#ecfdf5}.taskTop{display:flex;justify-content:space-between;align-items:center}.icon{width:50px;height:50px;border-radius:17px;background:#e0f2fe;display:grid;place-items:center;font-size:26px}.pill{background:#f1f5f9;color:#64748b;border-radius:999px;padding:6px 10px;font-weight:900;font-size:13px}.ladder{display:grid;gap:8px;margin-top:12px}.ladder button{text-align:left;border:1px solid #e2e8f0;background:white;border-radius:15px;padding:10px;cursor:pointer}.ladder button.active{background:#0f172a;color:white}textarea,input{width:100%;border:1px solid #e2e8f0;border-radius:16px;padding:12px;background:#fff;margin:6px 0 10px}textarea{min-height:84px;resize:vertical}label{font-weight:900;display:block;margin-top:10px}.note{background:#fffbeb;border-left:5px solid #f59e0b;border-radius:18px;padding:14px;line-height:1.7;color:#78350f}.blue{background:#eff6ff;border-left-color:#38bdf8;color:#1e3a8a}.green{background:#ecfdf5;border-left-color:#22c55e;color:#065f46}.red{background:#fef2f2;border-left-color:#ef4444;color:#7f1d1d}.quote{font-size:20px;line-height:1.8;background:#f8fafc;border-radius:22px;padding:16px}.status{font-weight:900;color:#0369a1}.history{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:13px;margin-top:10px;color:#475569;line-height:1.6}.chatBox{height:360px;overflow:auto;background:#f8fafc;border:1px solid #e2e8f0;border-radius:20px;padding:14px;display:flex;flex-direction:column;gap:10px}.bubble{max-width:82%;padding:12px 14px;border-radius:18px;line-height:1.65}.lightBubble{background:#fff;border:1px solid #e2e8f0;align-self:flex-start}.userBubble{background:#0f172a;color:#fff;align-self:flex-end}.chatEmpty{color:#64748b;line-height:1.8;background:#fff;border:1px dashed #cbd5e1;border-radius:18px;padding:16px}.footer{border-radius:22px;padding:14px;margin-top:18px;display:flex;justify-content:space-between;gap:12px;color:#64748b}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#f1f5f9;padding:2px 6px;border-radius:8px}.voiceBox{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}.hidden{display:none!important}@media(max-width:920px){.hero{grid-template-columns:1fr}.nav{grid-template-columns:repeat(2,1fr)}.grid2,.grid3{grid-template-columns:1fr}.choiceGrid{grid-template-columns:1fr}.voiceBox{grid-template-columns:1fr}h1{font-size:28px}}
</style>
</head>
<body>
<div class="app">
<header class="hero">
 <div><div class="tag">🌟 小光 · 每日练习</div><h1 id="todayTitle">小光</h1><p class="sub">每天只看五件事：数学、英语、语文、口琴、网球。每一项只改一个小点，做完就留下记录。</p><div class="motto" id="motto">今天不用全满。先把一个动作做准，明天就会轻一点。</div></div>
 <div class="progress"><div class="tiny">今日五项</div><div class="progressNum" id="progressNum">0%</div><div class="bar"><div class="barin" id="bar"></div></div><div class="tiny" id="progressText">今天先完成一项就很好。</div></div>
</header>
<section class="panel">
 <div class="row"><div class="avatar">✨</div><div><div class="title">你好，我是小光。</div><p class="sub">我不把页面变复杂。你每天打开，只需要知道今天练哪几项、每项只改哪一点。</p></div></div>
 <div class="chips"><span class="chip">数学</span><span class="chip">英语</span><span class="chip">语文</span><span class="chip">口琴</span><span class="chip">网球</span><span class="chip">老师反馈</span><span class="chip">周复盘</span></div>
</section>
<section class="panel">
 <div class="voiceBox"><div><div class="row"><button id="readPage">🔊 小光读当前页</button><button id="readMotto">💬 读核心句</button><button id="stopVoice">⏹ 停止</button><select id="voiceSel"><option value="marin" selected>marin 自然</option><option value="cedar">cedar 温暖</option><option value="alloy">alloy 平衡</option><option value="nova">nova 明亮</option><option value="fable">fable 故事感</option></select></div><p class="sub">优先使用高级语音；如果后端或 API Key 未配置，才回退浏览器本地语音。</p></div><div class="status" id="ttsStatus">检查语音状态中...</div></div>
</section>
<nav class="nav" id="nav"></nav>
<main id="pages"></main>
<footer class="footer"><div>原则：每日少一点，动作准一点，记录留一点。</div><button class="secondary" id="exportBtn">导出今日记录</button></footer>
</div>
<script type="module" src="./app.js?v=20260602-final-review-4b"></script>
</body>
</html>
